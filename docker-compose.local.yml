services:
  postgres:
    image: postgres:16
    container_name: buratino-smoke-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: buratino_smoke
      POSTGRES_USER: buratino
      POSTGRES_PASSWORD: buratino
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buratino -d buratino_smoke"]
      interval: 5s
      timeout: 5s
      retries: 20
